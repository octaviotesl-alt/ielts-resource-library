<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Resource Library</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        h2 {
            margin-top: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }

        a {
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .section {
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>IELTS Resource Library</h1>
        <p class="subtitle">Interactive practice for IELTS students</p>

        <div class="section">
            <h2>Vocabulary</h2>
            <ul>
                <li><a href="education/">Education Collocations</a></li>
            </ul>
        </div>

        <div class="section">
            <h2>Coming Soon</h2>
            <ul>
                <li>Writing Task 2 Ideas</li>
                <li>Speaking Part 2 Topics</li>
                <li>Reading Practice Sets</li>
            </ul>
        </div>
    </div>
</body>
</html>
